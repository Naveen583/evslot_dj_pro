{% load static %}
<html>
<head>
  <title>Forgot Password – EV Charge Hub</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,600,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/ev-animations.css' %}">
</head>
<body style="background:#0a0e1a;min-height:100vh;display:flex;align-items:center;justify-content:center;">

<!-- Splash -->
<div id="ev-splash">
  <div class="ev-splash-logo">⚡ EV CHARGE HUB</div>
  <div class="ev-splash-sub">Smart Charging · Smarter Living</div>
  <div class="ev-splash-bar"><div class="ev-splash-bar-fill"></div></div>
</div>

<div class="page-content" style="width:100%;max-width:480px;padding:20px;">
  <div style="background:#0d1117;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,150,255,0.15);">
    <div style="background:linear-gradient(90deg,#00c6ff,#0072ff,#7b2ff7);height:5px;"></div>
    <div style="padding:40px;">
      <div style="text-align:center;margin-bottom:30px;">
        <div style="font-size:40px;">🔑</div>
        <h2 style="color:#fff;font-weight:700;margin:10px 0 4px;">Forgot Password?</h2>
        <p style="color:#8892a4;font-size:14px;">Enter your email — we'll send a reset link</p>
      </div>

      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" style="border-radius:8px;">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:20px;">
          <label style="color:#4a9eff;font-size:13px;font-weight:600;">Email Address</label>
          <input type="email" name="email" required class="form-control" placeholder="your@email.com"
            style="background:#131920;border:1px solid #1e2d40;color:#fff;border-radius:8px;padding:12px 16px;margin-top:6px;">
        </div>
        <button type="submit" class="btn-ev-glow" style="width:100%;padding:14px;font-size:16px;border-radius:8px;">
          📧 Send Reset Link
        </button>
      </form>

      <div style="text-align:center;margin-top:20px;">
        <a href="{% url 'user_login' %}" style="color:#4a9eff;font-size:14px;">← Back to Login</a>
      </div>
    </div>
    <div style="background:linear-gradient(90deg,#00c6ff,#0072ff,#7b2ff7);height:4px;"></div>
  </div>
</div>

<script src="{% static 'js/jquery.min.js' %}"></script>
<script>
  setTimeout(() => { document.getElementById('ev-splash').classList.add('hide'); }, 1800);
</script>
<script src="/static/js/naveen-chat.js"></script></body>
</html>
