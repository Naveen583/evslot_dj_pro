{% load static %}
<html>
<head>
    <link rel="icon" href="/static/images/ev.jpg" type="image/jpeg">

  <title>Reset Password – EV Charge Hub</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,600,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/ev-animations.css' %}">
</head>
<body style="background:#0a0e1a;min-height:100vh;display:flex;align-items:center;justify-content:center;">


<div id='ev-splash' style='position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity 0.4s ease, visibility 0.4s ease;'>
    <div style='position:relative; width:80px; height:80px;'>
        <div style='position:absolute; top:0; left:0; width:100%; height:100%; border-radius:50%; border:3px solid transparent; border-top-color:#38bdf8; border-right-color:#818cf8; animation: ev-spin 0.8s linear infinite;'></div>
        <div style='position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:24px;'>⚡</div>
    </div>
</div>
<style>
@keyframes ev-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
<script>
// Run immediately instead of waiting for window.load which gets blocked by heavy iframes
setTimeout(function() {
    var s = document.getElementById('ev-splash');
    if(s) { s.style.opacity = '0'; setTimeout(()=>s.style.display='none', 400); }
}, 600);
</script>
</div>
</div>

<div class="page-content" style="width:100%;max-width:480px;padding:20px;">
  <div style="background:#0d1117;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,150,255,0.15);">
    <div style="background:linear-gradient(90deg,#00c6ff,#0072ff,#7b2ff7);height:5px;"></div>
    <div style="padding:40px;">
      <div style="text-align:center;margin-bottom:30px;">
        <div style="font-size:40px;">🔒</div>
        <h2 style="color:#fff;font-weight:700;margin:10px 0 4px;">Set New Password</h2>
        <p style="color:#8892a4;font-size:14px;">Choose a strong password</p>
      </div>

      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" style="border-radius:8px;">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:16px;">
          <label style="color:#4a9eff;font-size:13px;font-weight:600;">New Password</label>
          <input type="password" name="password" required class="form-control" placeholder="New password"
            style="background:#131920;border:1px solid #1e2d40;color:#fff;border-radius:8px;padding:12px 16px;margin-top:6px;">
        </div>
        <div style="margin-bottom:20px;">
          <label style="color:#4a9eff;font-size:13px;font-weight:600;">Confirm Password</label>
          <input type="password" name="confirm" required class="form-control" placeholder="Confirm password"
            style="background:#131920;border:1px solid #1e2d40;color:#fff;border-radius:8px;padding:12px 16px;margin-top:6px;">
        </div>
        <button type="submit" class="btn-ev-glow" style="width:100%;padding:14px;font-size:16px;border-radius:8px;">
          🔓 Reset Password
        </button>
      </form>
    </div>
    <div style="background:linear-gradient(90deg,#00c6ff,#0072ff,#7b2ff7);height:4px;"></div>
  </div>
</div>

<script src="{% static 'js/jquery.min.js' %}"></script>

<script src="/static/js/lang-toggle.js"></script><script src="/static/js/naveen-chat.js"></script>
</body>
</html>
